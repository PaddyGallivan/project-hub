<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paddy's Project Hub</title>
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --accent: #3b82f6;
            --text: #e6edf3;
            --muted: #7d8590;
            --border: #30363d;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
            --info: #58a6ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .btn {
            padding: 0.5rem 1rem;
            background-color: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        /* Stats Row */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: var(--card);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
        }

        /* Priorities Section */
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 2rem 0 1rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--accent);
        }

        .priorities-list {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .priority-item {
            display: grid;
            grid-template-columns: 40px 1fr auto auto auto;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .priority-item:last-child {
            border-bottom: none;
        }

        .priority-rank {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--accent);
            text-align: center;
        }

        .priority-name {
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .priority-name:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .category-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .category-badge.ssv-ecosystem { background-color: #1f6feb; color: #c9d1d9; }
        .category-badge.education { background-color: #1f6feb; color: #c9d1d9; }
        .category-badge.events { background-color: #da3633; color: #fff; }
        .category-badge.community { background-color: #a371f7; color: #fff; }
        .category-badge.health { background-color: #79c0ff; color: #0d1117; }

        .revenue-item {
            text-align: right;
            min-width: 120px;
        }

        .revenue-label {
            font-size: 0.8rem;
            color: var(--muted);
            display: block;
        }

        .revenue-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--success);
        }

        /* Revenue Tracker */
        .revenue-tracker {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .revenue-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .revenue-year {
            text-align: center;
            padding: 1rem;
            background-color: rgba(59, 130, 246, 0.1);
            border-radius: 6px;
        }

        .revenue-year-label {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        .revenue-year-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--success);
        }

        .revenue-chart {
            display: flex;
            height: 30px;
            border-radius: 4px;
            overflow: hidden;
            gap: 2px;
            background-color: var(--bg);
            padding: 2px;
        }

        .revenue-bar {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
            color: white;
        }

        .revenue-bar.ssv-ecosystem { background-color: #3fb950; }
        .revenue-bar.education { background-color: #1f6feb; }
        .revenue-bar.events { background-color: #f85149; }
        .revenue-bar.community { background-color: #a371f7; }
        .revenue-bar.health { background-color: #79c0ff; }

        /* Filter & Search */
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 0.75rem;
            background-color: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            font-size: 1rem;
        }

        .search-input::placeholder {
            color: var(--muted);
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            background-color: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .filter-btn.active {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .filter-btn:hover {
            border-color: var(--accent);
        }

        /* Project Grid */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .project-card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.2s;
            position: relative;
        }

        .project-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
            gap: 0.5rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
            flex: 1;
            transition: opacity 0.2s;
        }

        .card-title:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .card-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 1.2rem;
            transition: color 0.2s;
        }

        .card-link:hover {
            color: var(--accent);
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-badge.live { background-color: #1f6feb; color: #c9d1d9; }
        .status-badge.ready { background-color: #3fb950; color: #0d1117; }
        .status-badge.dev { background-color: #d29922; color: #0d1117; }
        .status-badge.paused { background-color: #6e7681; color: #c9d1d9; }

        .revenue-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background-color: var(--success);
            color: #0d1117;
            margin-left: 0.5rem;
        }

        .card-description {
            font-size: 0.95rem;
            color: var(--text);
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .progress-bar {
            height: 6px;
            background-color: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--accent);
            transition: width 0.3s;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .tag {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            background-color: var(--border);
            color: var(--muted);
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .card-meta {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 0.75rem;
        }

        .domain-links {
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }

        .domain-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            transition: opacity 0.2s;
        }

        .domain-link:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        .next-action {
            padding: 0.75rem;
            background-color: rgba(58, 166, 215, 0.1);
            border-left: 2px solid var(--info);
            border-radius: 4px;
            font-size: 0.9rem;
            color: var(--text);
        }

        /* Footer */
        .footer {
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
        }

        @media (max-width: 768px) {
            .project-grid {
                grid-template-columns: 1fr;
            }

            .priority-item {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }

            .priority-rank {
                position: absolute;
                top: 1rem;
                right: 1rem;
            }

            .revenue-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Paddy's Project Hub</h1>
            <div class="header-right">
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span>Live from Supabase</span>
                </div>
                <button class="btn" onclick="location.reload()">Refresh</button>
            </div>
        </div>

        <!-- Stats Row -->
        <div class="stats" id="statsContainer">
            <div class="stat-card">
                <div class="stat-label">Live</div>
                <div class="stat-value" id="statLive">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Ready</div>
                <div class="stat-value" id="statReady">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">In Dev</div>
                <div class="stat-value" id="statDev">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Actions</div>
                <div class="stat-value" id="statActions">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Progress</div>
                <div class="stat-value" id="statAvg">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total</div>
                <div class="stat-value" id="statTotal">0</div>
            </div>
        </div>

        <!-- Overall Priorities Section -->
        <h2 class="section-title">Overall Priorities</h2>
        <div class="priorities-list" id="prioritiesList">
            <div style="padding: 2rem; text-align: center; color: var(--muted);">Loading priorities...</div>
        </div>

        <!-- Revenue Tracker Section -->
        <h2 class="section-title">3-Year Revenue Projection</h2>
        <div class="revenue-tracker" id="revenueTracker">
            <div style="text-align: center; color: var(--muted);">Loading revenue data...</div>
        </div>

        <!-- Filter & Search -->
        <div class="controls">
            <input
                type="text"
                class="search-input"
                id="searchInput"
                placeholder="Search projects by name or description..."
            >
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="live">Live</button>
                <button class="filter-btn" data-filter="ready">Ready</button>
                <button class="filter-btn" data-filter="dev">In Dev</button>
            </div>
        </div>

        <!-- Project Grid -->
        <div class="project-grid" id="projectGrid">
            <div class="empty-state">Loading projects...</div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>Claude dashboard • Last updated: <span id="lastUpdated">--</span> • Built with Supabase</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bymtqxkcsxvslcdfedpa.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5bXRxeGtjc3h2c2xjZGZlZHBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMzYxNjcsImV4cCI6MjA5MDgxMjE2N30.63NWyv7NIHdjFuHVsaYgZiA1m5U_Dc5VhLMA0qTj_As';
        const TABLE_NAME = 'project_hub';

        let allProjects = [];
        let currentFilter = 'all';

        async function fetchProjects() {
            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/${TABLE_NAME}?order=sort_order.asc`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                        }
                    }
                );
                const data = await response.json();
                allProjects = data;
                render();
            } catch (error) {
                console.error('Error fetching projects:', error);
                document.getElementById('projectGrid').innerHTML =
                    '<div class="empty-state">Error loading projects. Please refresh.</div>';
            }
        }

        function formatCurrency(value) {
            if (!value) return '$0';
            return `$${value.toLocaleString()}`;
        }

        function getCategoryBadgeClass(category) {
            if (!category) return '';
            const normalized = category.toLowerCase().replace(/\s+/g, '-');
            return `category-badge ${normalized}`;
        }

        function getStatusBadgeClass(status) {
            if (!status) return 'status-badge';
            const normalized = status.toLowerCase();
            return `status-badge ${normalized}`;
        }

        function renderStats() {
            const live = allProjects.filter(p => p.status === 'live').length;
            const ready = allProjects.filter(p => p.status === 'ready').length;
            const dev = allProjects.filter(p => p.status === 'dev').length;
            const actions = allProjects.filter(p => p.next_action).length;
            const avgProgress = allProjects.length > 0
                ? Math.round(allProjects.reduce((sum, p) => sum + (p.progress_pct || 0), 0) / allProjects.length)
                : 0;
            const total = allProjects.length;

            document.getElementById('statLive').textContent = live;
            document.getElementById('statReady').textContent = ready;
            document.getElementById('statDev').textContent = dev;
            document.getElementById('statActions').textContent = actions;
            document.getElementById('statAvg').textContent = `${avgProgress}%`;
            document.getElementById('statTotal').textContent = total;
        }

        function renderPriorities() {
            const priorities = allProjects
                .filter(p => p.income_priority && p.income_priority > 0)
                .sort((a, b) => a.income_priority - b.income_priority);

            if (priorities.length === 0) {
                document.getElementById('prioritiesList').innerHTML =
                    '<div style="padding: 2rem; text-align: center; color: var(--muted);">No priority projects configured.</div>';
                return;
            }

            const html = priorities.map((project, index) => {
                const y1 = project.revenue_y1 || 0;
                const y2 = project.revenue_y2 || 0;
                const y3 = project.revenue_y3 || 0;
                const total = y1 + y2 + y3;
                const categoryClass = getCategoryBadgeClass(project.revenue_category);

                return `
                    <div class="priority-item">
                        <div class="priority-rank">${index + 1}</div>
                        <a href="project.html?id=${project.id}" class="priority-name">${project.project_name}</a>
                        <div class="${categoryClass}">${project.revenue_category || 'N/A'}</div>
                        <div class="revenue-item">
                            <span class="revenue-label">Y1</span>
                            <div class="revenue-value">${formatCurrency(y1)}</div>
                        </div>
                        <div class="revenue-item">
                            <span class="revenue-label">3-Yr Total</span>
                            <div class="revenue-value">${formatCurrency(total)}</div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('prioritiesList').innerHTML = html;
        }

        function renderRevenueTracker() {
            let y1Total = 0, y2Total = 0, y3Total = 0;
            const categoryTotals = {};

            allProjects.forEach(p => {
                y1Total += p.revenue_y1 || 0;
                y2Total += p.revenue_y2 || 0;
                y3Total += p.revenue_y3 || 0;

                if (p.revenue_category) {
                    if (!categoryTotals[p.revenue_category]) {
                        categoryTotals[p.revenue_category] = 0;
                    }
                    categoryTotals[p.revenue_category] += (p.revenue_y1 || 0) + (p.revenue_y2 || 0) + (p.revenue_y3 || 0);
                }
            });

            const totalRevenue = y1Total + y2Total + y3Total;
            const categoryBars = Object.entries(categoryTotals)
                .map(([category, amount]) => {
                    const percentage = totalRevenue > 0 ? (amount / totalRevenue * 100) : 0;
                    const categoryClass = category.toLowerCase().replace(/\s+/g, '-');
                    return `<div class="revenue-bar ${categoryClass}" style="flex: ${percentage}">
                        ${percentage > 8 ? category.substring(0, 3) : ''}
                    </div>`;
                })
                .join('');

            document.getElementById('revenueTracker').innerHTML = `
                <div class="revenue-grid">
                    <div class="revenue-year">
                        <div class="revenue-year-label">Year 1</div>
                        <div class="revenue-year-value">${formatCurrency(y1Total)}</div>
                    </div>
                    <div class="revenue-year">
                        <div class="revenue-year-label">Year 2</div>
                        <div class="revenue-year-value">${formatCurrency(y2Total)}</div>
                    </div>
                    <div class="revenue-year">
                        <div class="revenue-year-label">Year 3</div>
                        <div class="revenue-year-value">${formatCurrency(y3Total)}</div>
                    </div>
                </div>
                <div class="revenue-chart">
                    ${categoryBars}
                </div>
            `;
        }

        function renderProjects() {
            let filtered = allProjects;

            if (currentFilter !== 'all') {
                filtered = filtered.filter(p => p.status === currentFilter);
            }

            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            if (searchQuery) {
                filtered = filtered.filter(p =>
                    (p.project_name && p.project_name.toLowerCase().includes(searchQuery)) ||
                    (p.description && p.description.toLowerCase().includes(searchQuery))
                );
            }

            if (filtered.length === 0) {
                document.getElementById('projectGrid').innerHTML =
                    '<div class="empty-state">No projects found.</div>';
                return;
            }

            const html = filtered.map(project => {
                const domains = project.domains ? (Array.isArray(project.domains) ? project.domains : [project.domains]) : [];
                const domainLinks = domains.map(d => `<a href="https://${d}" target="_blank" class="domain-link">${d}</a>`).join(', ');

                const revenueTag = project.income_priority && project.income_priority > 0
                    ? '<span class="revenue-badge">$</span>'
                    : '';

                return `
                    <div class="project-card">
                        <div class="card-header">
                            <a href="project.html?id=${project.id}" class="card-title">${project.project_name}</a>
                            <a href="${project.live_url || '#'}" target="_blank" class="card-link" title="Open live site">↗</a>
                        </div>
                        <div>
                            <span class="${getStatusBadgeClass(project.status)}">${project.status || 'N/A'}</span>
                            ${revenueTag}
                        </div>
                        ${project.description ? `<div class="card-description">${project.description}</div>` : ''}
                        ${project.progress_pct !== null && project.progress_pct !== undefined ? `
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${project.progress_pct}%"></div>
                            </div>
                        ` : ''}
                        <div class="card-tags">
                            ${project.category ? `<span class="tag">${project.category}</span>` : ''}
                            ${project.tech_stack ? project.tech_stack.split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('') : ''}
                        </div>
                        ${domainLinks ? `<div class="domain-links">${domainLinks}</div>` : ''}
                        ${project.next_action ? `<div class="next-action"><strong>Next:</strong> ${project.next_action}</div>` : ''}
                        <div class="card-meta">Updated: ${project.last_updated ? new Date(project.last_updated).toLocaleDateString() : 'N/A'}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('projectGrid').innerHTML = html;
        }

        function render() {
            renderStats();
            renderPriorities();
            renderRevenueTracker();
            renderProjects();
            document.getElementById('lastUpdated').textContent = new Date().toLocaleString();
        }

        // Event Listeners
        document.getElementById('searchInput').addEventListener('input', renderProjects);

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.filter;
                renderProjects();
            });
        });

        // Load data
        fetchProjects();
    </script>
</body>
</html>
