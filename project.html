<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details</title>
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --accent: #3b82f6;
            --text: #e6edf3;
            --muted: #7d8590;
            --border: #30363d;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
            --info: #58a6ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent);
            text-decoration: none;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }

        .back-link:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* Project Header */
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .project-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .header-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }

        .status-badge {
            display: inline-block;
            padding: 0.35rem 0.9rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-badge.live { background-color: #1f6feb; color: #c9d1d9; }
        .status-badge.ready { background-color: #3fb950; color: #0d1117; }
        .status-badge.dev, .status-badge.in_dev, .status-badge.in\ development { background-color: #d29922; color: #0d1117; }
        .status-badge.paused { background-color: #6e7681; color: #c9d1d9; }
        .status-badge.idea { background-color: #6e4bc4; color: #fff; }
        .status-badge.archived { background-color: #484f58; color: #c9d1d9; }
        .status-badge.ready\ to\ deploy { background-color: #3fb950; color: #0d1117; }
        .status-badge.early\ stage { background-color: #d29922; color: #0d1117; }
        .status-badge.active { background-color: #1f6feb; color: #c9d1d9; }

        .category-badge {
            display: inline-block;
            padding: 0.35rem 0.9rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .category-badge.ssv-ecosystem { background-color: #1f6feb; color: #c9d1d9; }
        .category-badge.education { background-color: #1f6feb; color: #c9d1d9; }
        .category-badge.events { background-color: #da3633; color: #fff; }
        .category-badge.community { background-color: #a371f7; color: #fff; }
        .category-badge.health { background-color: #79c0ff; color: #0d1117; }
        .category-badge.tools { background-color: #d29922; color: #0d1117; }
        .category-badge.web\ app { background-color: #3b82f6; color: #fff; }
        .category-badge.domain { background-color: #6e4bc4; color: #fff; }
        .category-badge.planning { background-color: #484f58; color: #c9d1d9; }
        .category-badge.automation { background-color: #f6821f; color: #fff; }
        .category-badge.data { background-color: #58a6ff; color: #0d1117; }

        .header-links {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .project-link {
            padding: 0.5rem 1.2rem;
            background-color: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: opacity 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
        }

        .project-link:hover { opacity: 0.85; }

        .project-link.secondary {
            background-color: var(--card);
            border: 1px solid var(--border);
        }

        .project-link.secondary:hover {
            border-color: var(--accent);
        }

        /* Sections */
        .section {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Quick Stats Row */
        .quick-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .quick-stat {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }

        .quick-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .quick-stat-label {
            font-size: 0.8rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0.25rem;
        }

        /* Key Features */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.75rem;
        }

        .feature-item {
            display: flex;
            align-items: start;
            gap: 0.75rem;
            padding: 0.75rem;
            background-color: var(--bg);
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .feature-check {
            color: var(--success);
            font-weight: bold;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .feature-text {
            font-size: 0.95rem;
            line-height: 1.4;
        }

        /* Status Grid */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .status-item {
            padding: 1rem;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .status-label {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 0.4rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .status-value {
            font-size: 1rem;
            color: var(--text);
        }

        /* Progress Bar */
        .progress-bar {
            height: 10px;
            background-color: var(--border);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        .progress-label {
            font-size: 0.9rem;
            color: var(--muted);
        }

        /* Description */
        .description {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text);
            margin-bottom: 1rem;
        }

        /* Tech Stack */
        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tech-tag {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            background-color: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Revenue Section */
        .revenue-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .revenue-item {
            text-align: center;
            padding: 1.25rem;
            background-color: var(--bg);
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .revenue-label {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .revenue-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--success);
        }

        .revenue-total {
            text-align: center;
            padding: 0.75rem;
            background-color: rgba(63, 185, 80, 0.1);
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--success);
            margin-bottom: 1rem;
        }

        .scale-notes {
            padding: 1rem;
            background-color: var(--bg);
            border-left: 3px solid var(--accent);
            border-radius: 4px;
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text);
            margin-top: 1rem;
        }

        .scale-notes strong {
            color: var(--accent);
        }

        /* Cost Section */
        .cost-box {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.25rem;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .cost-amount {
            font-size: 1.8rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .cost-amount.free {
            color: var(--success);
        }

        .cost-amount.paid {
            color: var(--warning);
        }

        .cost-details {
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.5;
        }

        /* Domains */
        .domains-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .domain-item {
            padding: 0.6rem 1rem;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .domain-link {
            color: var(--accent);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .domain-link:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* Next Steps */
        .next-steps-box {
            padding: 1.25rem;
            background-color: rgba(58, 166, 215, 0.1);
            border-left: 3px solid var(--info);
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        .next-steps-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--info);
            font-size: 0.95rem;
        }

        .next-steps-text {
            font-size: 0.95rem;
            color: var(--text);
            line-height: 1.5;
        }

        /* Notes */
        .notes-box {
            padding: 1.25rem;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
            color: var(--text);
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Web App Links */
        .app-links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .app-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1.2rem;
            background-color: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .app-link:hover { opacity: 0.85; }

        .app-link.alt {
            background-color: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .app-link.alt:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }

        /* Markdown Content */
        .md-content {
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text);
        }

        .md-content h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 1.5rem 0 0.75rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }

        .md-content h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 1.5rem 0 0.5rem 0;
            color: var(--accent);
        }

        .md-content h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 1.25rem 0 0.5rem 0;
            color: var(--info);
        }

        .md-content p {
            margin-bottom: 0.75rem;
        }

        .md-content ul, .md-content ol {
            margin: 0.5rem 0 1rem 1.5rem;
        }

        .md-content li {
            margin-bottom: 0.35rem;
        }

        .md-content code {
            background-color: rgba(110, 118, 129, 0.2);
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            font-size: 0.88rem;
            font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
        }

        .md-content pre {
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
            margin: 0.75rem 0;
        }

        .md-content pre code {
            background: none;
            padding: 0;
        }

        .md-content blockquote {
            border-left: 3px solid var(--accent);
            padding: 0.5rem 1rem;
            margin: 0.75rem 0;
            background-color: rgba(59, 130, 246, 0.05);
            color: var(--muted);
        }

        .md-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.5rem 0;
        }

        .md-content a {
            color: var(--accent);
            text-decoration: none;
        }

        .md-content a:hover {
            text-decoration: underline;
        }

        .md-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.75rem 0;
        }

        .md-content th, .md-content td {
            border: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            text-align: left;
        }

        .md-content th {
            background-color: var(--bg);
            font-weight: 600;
        }

        .md-content strong {
            color: #fff;
        }

        .brief-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }

        .brief-toggle .chevron {
            transition: transform 0.2s;
            font-size: 1.2rem;
        }

        .brief-toggle .chevron.open {
            transform: rotate(90deg);
        }

        .brief-body {
            margin-top: 1rem;
        }

        .brief-body.collapsed {
            display: none;
        }

        .last-updated-badge {
            display: inline-block;
            font-size: 0.75rem;
            color: var(--muted);
            background-color: var(--bg);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            margin-left: 0.5rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--muted);
            font-size: 1.1rem;
        }

        .error {
            background-color: rgba(248, 81, 73, 0.1);
            border-left: 3px solid var(--danger);
            padding: 1.25rem;
            border-radius: 4px;
            color: var(--danger);
            margin-bottom: 1rem;
        }

        /* Nav between projects */
        .project-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .nav-btn {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            border-color: var(--accent);
            background-color: rgba(59, 130, 246, 0.1);
        }

        .nav-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .project-header { flex-direction: column; }
            .project-title { font-size: 1.5rem; }
            .status-grid { grid-template-columns: 1fr; }
            .revenue-grid { grid-template-columns: 1fr; }
            .quick-stats { grid-template-columns: repeat(2, 1fr); }
            .features-grid { grid-template-columns: 1fr; }
            .header-links { flex-direction: row; flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">&#8592; Back to Project Hub</a>
        <div id="content" class="loading">Loading project...</div>
    </div>

    <script>
        const API_URL = 'https://project-hub-api.pgallivan.workers.dev';

        let allProjects = [];

                function linkify(text) {
            if (!text) return '';
            return text.replace(/(https?:\/\/[^\s<>"']+)/g, function(url) {
                var clean = url.replace(/[.,;:!?\)']+$/, '');
                var trail = url.slice(clean.length);
                return '<a href="' + clean + '" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--accent);opacity:0.85" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.85">' + clean + '</a>' + trail;
            });
        }

function getProjectId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        function formatCurrency(value) {
            if (!value) return '$0';
            return `$${Number(value).toLocaleString()}`;
        }

        function getCategoryClass(category) {
            if (!category) return '';
            return category.toLowerCase().replace(/\s+/g, '-');
        }

        function getStatusClass(status) {
            if (!status) return '';
            return status.toLowerCase().replace(/\s+/g, '-');
        }

        // Lightweight markdown to HTML converter
        function renderMarkdown(md) {
            if (!md || !md.trim()) return '';
            let html = md;

            // Escape HTML entities first
            html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Code blocks (``` ... ```)
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
                return `<pre><code>${code.trim()}</code></pre>`;
            });

            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Headers
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

            // Bold and italic
            html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

            // Horizontal rules
            html = html.replace(/^---$/gm, '<hr>');

            // Blockquotes
            html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

            // Links
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

            // Tables
            html = html.replace(/^\|(.+)\|\s*\n\|[-| :]+\|\s*\n((?:\|.+\|\s*\n?)*)/gm, (match, header, body) => {
                const headers = header.split('|').map(h => h.trim()).filter(h => h);
                const rows = body.trim().split('\n').map(row =>
                    row.split('|').map(c => c.trim()).filter(c => c)
                );
                let table = '<table><thead><tr>';
                headers.forEach(h => table += `<th>${h}</th>`);
                table += '</tr></thead><tbody>';
                rows.forEach(row => {
                    table += '<tr>';
                    row.forEach(c => table += `<td>${c}</td>`);
                    table += '</tr>';
                });
                table += '</tbody></table>';
                return table;
            });

            // Unordered lists
            html = html.replace(/^(\s*)[-*] (.+)$/gm, (m, indent, text) => {
                return `<li>${text}</li>`;
            });
            html = html.replace(/((?:<li>.*<\/li>\s*)+)/g, '<ul>$1</ul>');

            // Paragraphs â wrap remaining loose lines
            const lines = html.split('\n');
            let result = '';
            let inBlock = false;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) {
                    if (!inBlock) result += '\n';
                    continue;
                }
                if (line.startsWith('<h') || line.startsWith('<pre') || line.startsWith('<ul') ||
                    line.startsWith('<ol') || line.startsWith('<table') || line.startsWith('<blockquote') ||
                    line.startsWith('<hr') || line.startsWith('</')) {
                    result += line + '\n';
                    inBlock = line.startsWith('<pre');
                    if (line.includes('</pre>')) inBlock = false;
                } else if (inBlock) {
                    result += line + '\n';
                    if (line.includes('</pre>')) inBlock = false;
                } else {
                    result += `<p>${line}</p>\n`;
                }
            }

            return result;
        }

        function getProgressColor(pct) {
            if (pct >= 90) return 'var(--success)';
            if (pct >= 50) return 'var(--accent)';
            if (pct >= 25) return 'var(--warning)';
            return 'var(--danger)';
        }

        // Extract multiple app URLs from notes field
        function extractAppLinks(project) {
            const links = [];

            // Primary live URL
            if (project.live_url) {
                links.push({ label: 'Visit Live Site', url: project.live_url, primary: true });
            }

            // Parse notes for additional URLs (e.g. KBT has Player, Host, Admin links)
            if (project.notes) {
                const urlPattern = /((?:Player|Host|Admin|App|Dashboard|API|Demo|Preview)[^:]*?):\s*(https?:\/\/[^\s|,]+)/gi;
                let match;
                while ((match = urlPattern.exec(project.notes)) !== null) {
                    const label = match[1].trim();
                    const url = match[2].trim();
                    // Avoid duplicating the live_url
                    if (url !== project.live_url) {
                        links.push({ label, url, primary: false });
                    }
                }

                // Also check for plain URLs with labels like "url | label" or "label: url"
                const pipePattern = /(https?:\/\/[^\s|]+)\s*\|\s*([^|,\n]+)/gi;
                while ((match = pipePattern.exec(project.notes)) !== null) {
                    const url = match[1].trim();
                    const label = match[2].trim();
                    if (url !== project.live_url && !links.find(l => l.url === url)) {
                        links.push({ label, url, primary: false });
                    }
                }
            }

            return links;
        }

        async function loadProject() {
            const projectId = getProjectId();

            if (!projectId) {
                document.getElementById('content').innerHTML = '<div class="error">No project ID provided. <a href="index.html" style="color:var(--accent)">Go back to hub</a></div>';
                return;
            }

            try {
                // Fetch this project and all projects (for nav)
                const [projectRes, allRes] = await Promise.all([
                    fetch(`${API_URL}/projects/${projectId}`),
                    fetch(`${API_URL}/projects`)
                ]);

                if (!projectRes.ok) {
                    document.getElementById('content').innerHTML = '<div class="error">Project not found. <a href="index.html" style="color:var(--accent)">Go back to hub</a></div>';
                    return;
                }

                const project = await projectRes.json();
                allProjects = await allRes.json();

                document.title = `${project.project_name} â Paddy's Project Hub`;
                renderProject(project);
            } catch (error) {
                console.error('Error loading project:', error);
                document.getElementById('content').innerHTML = '<div class="error">Error loading project. Please try again. <a href="index.html" style="color:var(--accent)">Go back to hub</a></div>';
            }
        }

        function renderProject(project) {
            const appLinks = extractAppLinks(project);
            const cost = parseFloat(project.cost_monthly || 0);
            const hasRevenue = (project.revenue_y1 > 0 || project.revenue_y2 > 0 || project.revenue_y3 > 0);
            const y1 = project.revenue_y1 || 0;
            const y2 = project.revenue_y2 || 0;
            const y3 = project.revenue_y3 || 0;
            const totalRevenue = y1 + y2 + y3;

            let html = '';

            // === HEADER ===
            html += `
                <div class="project-header">
                    <div>
                        <h1 class="project-title">${project.project_name}</h1>
                        <div class="header-badges">
                            <span class="status-badge ${getStatusClass(project.status)}">${project.status || 'N/A'}</span>
                            <span class="category-badge ${getCategoryClass(project.category)}">${project.category || 'N/A'}</span>
                            ${project.income_priority > 0 ? `<span style="background:var(--success);color:#0d1117;padding:0.35rem 0.9rem;border-radius:6px;font-size:0.85rem;font-weight:600">Priority #${project.income_priority}</span>` : ''}
                        </div>
                    </div>
                    <div class="header-links">
                        ${appLinks.map(link => `
                            <a href="${link.url}" target="_blank" class="project-link ${link.primary ? '' : 'secondary'}">${link.label} &#8599;</a>
                        `).join('')}
                    </div>
                </div>
            `;

            // === QUICK STATS ===
            html += `<div class="quick-stats">`;
            html += `
                <div class="quick-stat">
                    <div class="quick-stat-value" style="color:var(--accent)">${project.progress_pct !== null ? project.progress_pct + '%' : 'N/A'}</div>
                    <div class="quick-stat-label">Progress</div>
                </div>
            `;
            if (hasRevenue) {
                html += `
                    <div class="quick-stat">
                        <div class="quick-stat-value" style="color:var(--success)">${formatCurrency(y1)}</div>
                        <div class="quick-stat-label">Year 1 Revenue</div>
                    </div>
                    <div class="quick-stat">
                        <div class="quick-stat-value" style="color:var(--success)">${formatCurrency(totalRevenue)}</div>
                        <div class="quick-stat-label">3-Year Total</div>
                    </div>
                `;
            }
            html += `
                <div class="quick-stat">
                    <div class="quick-stat-value" style="color:${cost > 0 ? 'var(--warning)' : 'var(--success)'}">
                        ${cost > 0 ? 'A$' + cost.toFixed(2) : 'FREE'}
                    </div>
                    <div class="quick-stat-label">Monthly Cost</div>
                </div>
            `;
            html += `</div>`;

            // === PROGRESS BAR ===
            if (project.progress_pct !== null && project.progress_pct !== undefined) {
                html += `
                    <div class="section" style="padding: 1rem 1.5rem;">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${project.progress_pct}%; background-color: ${getProgressColor(project.progress_pct)}"></div>
                        </div>
                        <div class="progress-label">${project.progress_pct}% complete</div>
                    </div>
                `;
            }

            // === DESCRIPTION ===
            if (project.description) {
                html += `
                    <div class="section">
                        <h2 class="section-title">About</h2>
                        <div class="description">${linkify(project.description)}</div>
                    </div>
                `;
            }

            // === FULL PROJECT BRIEF (Markdown) ===
            if (project.detail_md && project.detail_md.trim()) {
                const renderedMd = renderMarkdown(project.detail_md);
                html += `
                    <div class="section">
                        <h2 class="section-title brief-toggle" onclick="toggleBrief()">
                            <span>Full Project Brief</span>
                            <span class="chevron open" id="briefChevron">&#9654;</span>
                        </h2>
                        <div class="brief-body" id="briefBody">
                            <div class="md-content">${renderedMd}</div>
                        </div>
                    </div>
                `;
            }

            // === KEY FEATURES ===
            if (project.key_features) {
                const features = project.key_features.split(/[.\n]/).filter(f => f.trim().length > 3);
                if (features.length > 0) {
                    html += `
                        <div class="section">
                            <h2 class="section-title">Key Features</h2>
                            <div class="features-grid">
                                ${features.map(f => `
                                    <div class="feature-item">
                                        <span class="feature-check">&#10003;</span>
                                        <span class="feature-text">${f.trim()}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
            }

            // === WEB APP LINKS (if multiple) ===
            if (appLinks.length > 1) {
                html += `
                    <div class="section">
                        <h2 class="section-title">App Links</h2>
                        <div class="app-links">
                            ${appLinks.map(link => `
                                <a href="${link.url}" target="_blank" class="app-link ${link.primary ? '' : 'alt'}">${link.label} &#8599;</a>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // === TECH STACK ===
            if (project.tech_stack) {
                const techs = project.tech_stack.split(',').map(t => t.trim()).filter(t => t);
                html += `
                    <div class="section">
                        <h2 class="section-title">Tech Stack</h2>
                        <div class="tech-stack">
                            ${techs.map(t => `<span class="tech-tag">${t}</span>`).join('')}
                        </div>
                    </div>
                `;
            }

            // === REVENUE PROJECTION ===
            if (hasRevenue) {
                html += `
                    <div class="section">
                        <h2 class="section-title">Revenue Projection</h2>
                        ${project.revenue_category ? `<span class="category-badge ${getCategoryClass(project.revenue_category)}" style="margin-bottom:1rem;display:inline-block">${project.revenue_category}</span>` : ''}
                        <div class="revenue-total">3-Year Total: ${formatCurrency(totalRevenue)}</div>
                        <div class="revenue-grid">
                            <div class="revenue-item">
                                <div class="revenue-label">Year 1</div>
                                <div class="revenue-value">${formatCurrency(y1)}</div>
                            </div>
                            <div class="revenue-item">
                                <div class="revenue-label">Year 2</div>
                                <div class="revenue-value">${formatCurrency(y2)}</div>
                            </div>
                            <div class="revenue-item">
                                <div class="revenue-label">Year 3</div>
                                <div class="revenue-value">${formatCurrency(y3)}</div>
                            </div>
                        </div>
                `;

                if (project.scale_notes) {
                    const scaleLines = project.scale_notes.split(/(?=Y\d:)/).filter(l => l.trim());
                    html += `
                        <div class="scale-notes">
                            <strong>Scale-up Plan:</strong><br>
                            ${scaleLines.map(l => l.trim()).join('<br>')}
                        </div>
                    `;
                }

                html += `</div>`;
            }

            // === COST ===
            html += `
                <div class="section">
                    <h2 class="section-title">Monthly Cost</h2>
                    <div class="cost-box">
                        <div class="cost-amount ${cost > 0 ? 'paid' : 'free'}">
                            ${cost > 0 ? 'A$' + cost.toFixed(2) + '/mo' : 'FREE'}
                        </div>
                        <div class="cost-details">
                            ${project.cost_notes || (cost > 0 ? 'Domain registration costs.' : 'Running on free-tier infrastructure (Cloudflare Workers + D1, Vercel, GitHub Pages).')}
                        </div>
                    </div>
                </div>
            `;

            // === DOMAINS ===
            if (project.domains) {
                const domains = project.domains.split(',').map(d => d.trim()).filter(d => d);
                if (domains.length > 0) {
                    html += `
                        <div class="section">
                            <h2 class="section-title">Domains</h2>
                            <div class="domains-list">
                                ${domains.map(d => `
                                    <div class="domain-item">
                                        <span style="color:var(--success)">&#9679;</span>
                                        <a href="https://${d}" target="_blank" class="domain-link">${d}</a>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
            }

            // === NEXT ACTION ===
            if (project.next_action) {
                html += `
                    <div class="section">
                        <h2 class="section-title">Next Action</h2>
                        <div class="next-steps-box">
                            <div class="next-steps-text">${linkify(project.next_action)}</div>
                        </div>
                    </div>
                `;
            }

            // === NOTES ===
            if (project.notes) {
                html += `
                    <div class="section">
                        <h2 class="section-title">Notes</h2>
                        <div class="notes-box">${linkify(project.notes)}</div>
                    </div>
                `;
            }

            // === PROJECT NAVIGATION ===
            const currentIdx = allProjects.findIndex(p => p.id === project.id);
            const prevProject = currentIdx > 0 ? allProjects[currentIdx - 1] : null;
            const nextProject = currentIdx < allProjects.length - 1 ? allProjects[currentIdx + 1] : null;

            html += `
                <div class="project-nav">
                    ${prevProject
                        ? `<a href="project.html?id=${prevProject.id}" class="nav-btn">&#8592; ${prevProject.project_name}</a>`
                        : `<span class="nav-btn disabled">&#8592; Previous</span>`
                    }
                    ${nextProject
                        ? `<a href="project.html?id=${nextProject.id}" class="nav-btn">${nextProject.project_name} &#8594;</a>`
                        : `<span class="nav-btn disabled">Next &#8594;</span>`
                    }
                </div>
            `;

            // === FOOTER ===
            html += `
                <div class="footer">
                    Paddy's Project Hub &middot; Powered by Cloudflare D1
                </div>
            `;

            document.getElementById('content').innerHTML = html;
            document.getElementById('content').classList.remove('loading');
        }

        function toggleBrief() {
            const body = document.getElementById('briefBody');
            const chevron = document.getElementById('briefChevron');
            if (body && chevron) {
                body.classList.toggle('collapsed');
                chevron.classList.toggle('open');
            }
        }

        loadProject();
    </script>
</body>
</html>
